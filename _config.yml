description: >- # this means to ignore newlines until "baseurl:"
  This course provides a comprehensive introduction to computer software systems, Python programming, and the fundamental concepts of Artificial Intelligence (AI). It begins with the basics of computer software, including software classification, applications, the Software Development Life Cycle (SDLC), and language translators such as compilers, interpreters, and assemblers. The course then develops programming skills through Python, covering syntax, data types, operators, control structures, object-oriented programming concepts, and the implementation of fundamental searching and sorting algorithms. Finally, it introduces the foundations of AI, including its history, evolution, types, applications, intelligent agents, and ethical considerations. Emphasis is placed on both theoretical understanding and practical problem-solving, enabling students to develop programming competence while gaining awareness of AI technologies and their impact on society and various industries.
